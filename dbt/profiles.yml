# Used inside Docker (DBT_PROFILES_DIR=/opt/airflow/project/dbt).
# Host/credentials come from env vars set in docker-compose.yml.
# For local dev outside Docker, use ~/.dbt/profiles.yml instead.

product_analytics:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'localhost') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'analytics_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'analytics_pw') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'analytics') }}"
      schema: public
      threads: 4

    prod:
      type: bigquery
      method: service-account
      project: "{{ env_var('GCP_PROJECT_ID') }}"
      dataset: "{{ env_var('BQ_DATASET', 'product_analytics') }}"
      keyfile: "{{ env_var('GOOGLE_APPLICATION_CREDENTIALS') }}"
      threads: 4
      timeout_seconds: 300
      location: US
      priority: interactive
